version: '3.8'

services:
  # Nginx web server
  nginx:
    image: nginx:alpine
    container_name: shipping_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./symfony/public:/var/www/symfony/public
      #- ./vue/app/dist:/var/www/vue/app/dist
    depends_on:
      - php
      - ui
    networks:
      - shipping_network
    restart: unless-stopped

  # PHP-FPM container
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: shipping_php
    volumes:
      - ./symfony:/var/www/symfony
    working_dir: /var/www/symfony
    networks:
      - shipping_network
    restart: unless-stopped
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      # command: ["tail", "-f", "/dev/null"]# ← розкоментувати, якщо хочете просто тримати контейнер живим для розробки
  # Vue.js UI container
  ui:
    build:
      context: ./vue
      dockerfile: Dockerfile
    container_name: shipping_ui
    #stdin_open: true # Аналог -i (interactive)
    #tty: true        # Аналог -t (pseudo-TTY)
    volumes: 
      - ./vue:/app
      - ./vue/node_modules
    working_dir: /app
    ports:
      - "8080:8080"
    networks:
      - shipping_network
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    command: ["npm","run","serve"]

networks:
  shipping_network:
    driver: bridge